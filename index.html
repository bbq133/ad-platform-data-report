<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Intel</title>
  <script>
    (function() {
      var m = localStorage.getItem('adintel-ui-mode');
      document.documentElement.dataset.uiMode = (m === 'default' ? 'default' : 'bright-minimal');
    })();
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    [data-ui-mode="bright-minimal"] body {
      font-family: 'Fira Sans', 'Inter', sans-serif;
      background-color: #f4f7fb;
    }
    [data-ui-mode="bright-minimal"] .font-heading {
      font-family: 'Fira Code', 'Fira Sans', monospace;
    }
    /* Bright mode soft palette: reduce block/background contrast and improve comfort */
    [data-ui-mode="bright-minimal"] [class*="bg-slate-900"] {
      background-color: #e9eef5 !important;
      border-color: #d7e0eb !important;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04) !important;
    }
    [data-ui-mode="bright-minimal"] [class*="bg-slate-800"] {
      background-color: #f1f5fb !important;
      border-color: #dbe4f0 !important;
    }
    [data-ui-mode="bright-minimal"] [class*="text-slate-200"],
    [data-ui-mode="bright-minimal"] [class*="text-slate-300"] {
      color: #334155 !important;
    }
    [data-ui-mode="bright-minimal"] [class*="text-slate-400"],
    [data-ui-mode="bright-minimal"] [class*="text-slate-500"] {
      color: #64748b !important;
    }
    [data-ui-mode="bright-minimal"] [class*="text-white"] {
      color: #0f172a !important;
    }
    [data-ui-mode="bright-minimal"] [class*="bg-indigo-"][class*="text-white"],
    [data-ui-mode="bright-minimal"] [class*="bg-blue-"][class*="text-white"],
    [data-ui-mode="bright-minimal"] [class*="bg-emerald-"][class*="text-white"],
    [data-ui-mode="bright-minimal"] [class*="bg-amber-"][class*="text-white"],
    [data-ui-mode="bright-minimal"] [class*="from-blue-"][class*="text-white"],
    [data-ui-mode="bright-minimal"] [class*="to-indigo-"][class*="text-white"] {
      color: #ffffff !important;
    }
    [data-ui-mode="bright-minimal"] [class*="bg-slate-900"][class*="text-white"],
    [data-ui-mode="bright-minimal"] [class*="bg-slate-800"][class*="text-white"] {
      color: #0f172a !important;
    }
    [data-ui-mode="bright-minimal"] [class*="hover:bg-slate-700"]:hover,
    [data-ui-mode="bright-minimal"] [class*="hover:bg-slate-800"]:hover {
      background-color: #e8eef7 !important;
    }
  </style>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
